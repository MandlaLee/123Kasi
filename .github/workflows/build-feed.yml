name: Build 123Kasi Feed

on:
  push:
    branches:
      - main
      - master
    paths:
      - "feed/**"
      - "scripts/generate-feed.js"
      - ".github/workflows/build-feed.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate feed index
        run: node scripts/generate-feed.js

      - name: Commit updated feed.json
        run: |
          if git diff --quiet data/feed.json; then
            echo "Feed index is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/feed.json
          git commit -m "Update 123Kasi feed index [skip ci]"
          git push
